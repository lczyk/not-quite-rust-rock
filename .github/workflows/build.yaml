name: Build

# Reusable: builds per-arch rocks and stitches a multiarch manifest.
# Parametrised by `version` -- the rock dir is rust/<version>, the
# rockcraft version is <version>, and the artefacts are named
# rust_<version>... So one input drives both the LLVM rock
# (1.93-26.04) and the cranelift rock (1.93.cranelift-26.04).
#
# Artefacts uploaded (for version=1.93-26.04):
#   - rust_1.93-26.04_amd64  -> rust/1.93-26.04/*.rock (amd64)
#   - rust_1.93-26.04_arm64  -> rust/1.93-26.04/*.rock (arm64)
#   - rust_1.93-26.04        -> rust_1.93-26.04.rock   (multiarch oci-archive)
on:
  workflow_call:
    inputs:
      version:
        description: rock version / dir under rust/ (e.g. 1.93-26.04)
        required: true
        type: string

jobs:
  build-per-arch:
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build rock
        uses: canonical/craft-actions/rockcraft-pack@main
        with:
          path: rust/${{ inputs.version }}
          verbosity: brief

      - name: Save the built rock as a pipeline artifact
        uses: actions/upload-artifact@v6
        with:
          name: rust_${{ inputs.version }}_${{ matrix.arch }}
          path: rust/${{ inputs.version }}/*.rock

  build-multiarch:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: build-per-arch
    steps:
      - name: Download rock artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: rust_${{ inputs.version }}_*
          path: artifacts
          merge-multiple: true

      - name: Create multiarch rock
        run: |
          sudo apt-get update
          sudo apt-get install -y buildah
          ls -lha artifacts
          buildah manifest create multiarch-rock
          buildah manifest add \
            --arch amd64 \
            multiarch-rock oci-archive:artifacts/rust_${{ inputs.version }}_amd64.rock
          buildah manifest add \
            --arch arm64 \
            multiarch-rock oci-archive:artifacts/rust_${{ inputs.version }}_arm64.rock
          buildah manifest push \
            --format oci \
            --all \
            multiarch-rock oci-archive:rust_${{ inputs.version }}.rock

      - name: Upload multiarch rock
        uses: actions/upload-artifact@v6
        with:
          name: rust_${{ inputs.version }}
          path: rust_${{ inputs.version }}.rock
