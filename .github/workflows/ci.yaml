name: CI
run-name: CI for ${{ github.ref }}

# Build + test on PR and on push to main. No publishing.
on:
  pull_request:
    paths-ignore:
      - 'cranelift/**'
      - '.github/workflows/cranelift-*.yaml'
  push:
    branches:
      - main
    paths-ignore:
      - 'cranelift/**'
      - '.github/workflows/cranelift-*.yaml'
  workflow_dispatch:

# Cancel an in-flight run on the same ref when a newer one starts
# (e.g. force-push to a PR branch). Pattern from canonical/chisel-releases.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/build.yaml

  test:
    needs: build
    uses: ./.github/workflows/test.yaml
