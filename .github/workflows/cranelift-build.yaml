name: cranelift-build

# Reusable workflow: bootstraps rust from source w/
# `codegen-backends = ["cranelift"]` for amd64 + arm64, runs the
# heavyweight tests that need the in-tree build tree, then uploads
# the dist tarballs + sha256 sidecars as workflow artefacts.
#
# Tests that live here (rather than cranelift-test.yaml) need the
# full bootstrap build tree (~10 GB) which is too large to ship as
# an artefact -- so we keep them in-job alongside the build that
# produced the tree. Lightweight checks (install + smoke + readelf
# on the installed driver) stay in cranelift-test.yaml.

on:
  workflow_call:
    inputs:
      rust-version:
        description: rust release tag to bootstrap (e.g. 1.93.0)
        required: false
        type: string
        default: '1.93.0'

jobs:
  bootstrap:
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
            triple: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            arch: arm64
            triple: aarch64-unknown-linux-gnu

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install bootstrap deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
              build-essential cmake ninja-build \
              python3 git curl pkg-config \
              libssl-dev xz-utils binutils

      - name: Bootstrap rust w/ cranelift-only codegen
        env:
          RUST_TAG: ${{ inputs.rust-version }}
        run: |
          bash cranelift/1.93/bootstrap_cranelift_rust.sh \
              "$RUNNER_TEMP/rust-cranelift-bootstrap"

      - name: Verify librustc_driver has no libLLVM
        run: |
          set -euo pipefail
          driver=$(find "$RUNNER_TEMP/rust-cranelift-bootstrap/rust/build" \
              -path '*/stage1/lib/librustc_driver-*.so' | head -n1)
          test -n "$driver" || { echo "no librustc_driver" >&2; exit 1; }
          if readelf -dW "$driver" | grep -qi 'NEEDED.*libLLVM'; then
              echo "FAIL: $driver has libLLVM in DT_NEEDED" >&2
              readelf -dW "$driver" | grep NEEDED >&2
              exit 1
          fi
          echo "OK: $driver has no libLLVM dependency"
          readelf -dW "$driver" | grep NEEDED

      - name: cg_clif testsuite
        env:
          CG_CLIF_FORCE_GNU_AS: '1'
        run: |
          cd "$RUNNER_TEMP/rust-cranelift-bootstrap/rust"
          ./x.py test --stage 1 compiler/rustc_codegen_cranelift

      - name: Package cranelift codegen backend manually
        # x.py dist intentionally drops the cranelift tarball on
        # the stable channel (gated behind unstable_features() in
        # dist.rs:1600). flipping to channel = "dev" would unlock
        # it but also breaks compiler-builtins on aarch64 (asm!
        # sym operands cranelift cannot lower). so we keep stable
        # and tar the codegen-backends/librustc_codegen_cranelift-*
        # .so by hand. tarball layout matches the install prefix
        # the test workflow extracts into directly (no install.sh
        # -- this is a single-file payload).
        run: |
          set -euo pipefail
          ver="${{ inputs.rust-version }}"
          triple="${{ matrix.triple }}"
          src="$RUNNER_TEMP/rust-cranelift-bootstrap/rust"
          clif=$(find "$src/build/$triple/stage1/lib/rustlib/$triple/codegen-backends" \
              -name 'librustc_codegen_cranelift-*.so' | head -n1)
          test -n "$clif" || { echo "no cranelift .so produced" >&2; exit 1; }

          # layout inside tarball:
          #   lib/rustlib/<triple>/codegen-backends/librustc_codegen_cranelift-*.so
          # extracted directly under the prefix the rust-installer
          # install.sh used for rustc + rust-std.
          staging="$RUNNER_TEMP/clif-pkg"
          rel="lib/rustlib/$triple/codegen-backends"
          mkdir -p "$staging/$rel"
          cp "$clif" "$staging/$rel/"

          pkg="rustc-codegen-cranelift-$ver-$triple"
          tar -cJf "$src/build/dist/$pkg.tar.xz" -C "$staging" .

      - name: Collect dist tarballs + sha256 sidecars
        run: |
          set -euo pipefail
          mkdir -p dist-out
          cp "$RUNNER_TEMP/rust-cranelift-bootstrap/rust/build/dist/"*.tar.xz dist-out/
          cd dist-out
          for f in *.tar.xz; do
              sha256sum "$f" > "$f.sha256"
          done
          ls -la

      - name: Upload tarballs as workflow artefact
        uses: actions/upload-artifact@v6
        with:
          name: cranelift-tarballs-${{ matrix.arch }}
          path: |
            dist-out/*.tar.xz
            dist-out/*.tar.xz.sha256
