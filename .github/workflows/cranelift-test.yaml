name: cranelift-test

# Reusable workflow: runs correctness tests against the
# cranelift-bootstrapped rust toolchain. Two layers:
#
#   1. readelf gate -- librustc_driver.so must have no libLLVM
#      in DT_NEEDED (otherwise our whole spike is for nothing).
#   2. smoke -- rustc --version, compile + run a tiny program
#      that exercises println!, Vec, iterator sum.
#   3. cg_clif testsuite -- ./x.py test --stage 1
#      compiler/rustc_codegen_cranelift. exercises cranelift's
#      intrinsic lowering, atomic fallback, panic glue, etc.
#      4448 tests pass locally on aarch64; gate strictly.
#
# Skipped: std/core unit tests (./x.py test library/std
# library/core). Has 2 known cranelift-incompatible failures
# (f16 intrinsics missing in Ubuntu libgcc; #[linkage="extern_weak"]
# unimplemented on cranelift aarch64). Documented out-of-tree.

on:
  workflow_call:
    inputs:
      rust-version:
        description: rust version under test (e.g. 1.93.0)
        required: false
        type: string
        default: '1.93.0'

jobs:
  test:
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
            triple: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            arch: arm64
            triple: aarch64-unknown-linux-gnu

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install test deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
              build-essential cmake ninja-build \
              python3 git curl pkg-config \
              libssl-dev xz-utils binutils

      - name: Rebuild bootstrap for tests
        # x.py test needs the full bootstrap build tree, not just the
        # dist tarballs. Re-running the bootstrap is the simplest way
        # to get a populated build/ dir; with stage0 + ccache fresh
        # in this runner it would be a duplicate spend, so we just
        # accept the cost. (cranelift releases rarely.)
        env:
          RUST_TAG: ${{ inputs.rust-version }}
        run: |
          bash cranelift/1.93/bootstrap_cranelift_rust.sh \
              "$RUNNER_TEMP/rust-cranelift-bootstrap"

      - name: Locate stage1 outputs
        id: locate
        run: |
          set -euo pipefail
          src="$RUNNER_TEMP/rust-cranelift-bootstrap/rust"
          driver=$(find "$src/build" -path '*/stage1/lib/librustc_driver-*.so' | head -n1)
          rustc="$src/build/${{ matrix.triple }}/stage1/bin/rustc"
          test -n "$driver" || { echo "no librustc_driver" >&2; exit 1; }
          test -x "$rustc"   || { echo "no stage1 rustc"   >&2; exit 1; }
          echo "src=$src"       >> "$GITHUB_OUTPUT"
          echo "driver=$driver" >> "$GITHUB_OUTPUT"
          echo "rustc=$rustc"   >> "$GITHUB_OUTPUT"

      - name: Verification gate -- librustc_driver has no libLLVM
        run: |
          set -euo pipefail
          driver="${{ steps.locate.outputs.driver }}"
          if readelf -dW "$driver" | grep -qi 'NEEDED.*libLLVM'; then
              echo "FAIL: $driver has libLLVM in DT_NEEDED" >&2
              readelf -dW "$driver" | grep NEEDED >&2
              exit 1
          fi
          echo "OK: $driver has no libLLVM dependency"
          readelf -dW "$driver" | grep NEEDED

      - name: Smoke -- rustc --version + hello world
        run: |
          set -euo pipefail
          rustc="${{ steps.locate.outputs.rustc }}"
          "$rustc" --version

          tmp=$(mktemp -d)
          cat > "$tmp/hello.rs" <<'EOF'
          fn main() {
              let v: Vec<i32> = (0..10).collect();
              let sum: i32 = v.iter().sum();
              println!("sum={}", sum);
          }
          EOF
          "$rustc" -o "$tmp/hello" "$tmp/hello.rs"
          out=$("$tmp/hello")
          [ "$out" = "sum=45" ] || { echo "FAIL: expected sum=45, got '$out'" >&2; exit 1; }
          echo "OK: smoke pass ($out)"

      - name: cg_clif testsuite (./x.py test --stage 1 compiler/rustc_codegen_cranelift)
        env:
          CG_CLIF_FORCE_GNU_AS: '1'
        run: |
          cd "${{ steps.locate.outputs.src }}"
          ./x.py test --stage 1 compiler/rustc_codegen_cranelift
