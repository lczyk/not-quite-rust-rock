name: Release

# Build + test + publish BOTH rocks to ghcr on push of a revision tag
# (r1, r2, ...). One repo-wide REVISION governs both rocks, so a single
# tag ships both:
#   - rust:1.93-26.04            (LLVM rock)
#   - rust:1.93.cranelift-26.04  (cranelift rock)
#
# The from-source cranelift toolchain *artefact* (the tarballs the
# cranelift rock consumes) is released separately by
# cranelift-release.yaml on the `cranelift-**` tag -- different cadence,
# and the rock pins a specific artefact revision internally.
on:
  push:
    tags:
      - 'r[0-9]*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-llvm:
    uses: ./.github/workflows/build.yaml
    with:
      version: '1.93-26.04'

  test-llvm:
    needs: build-llvm
    uses: ./.github/workflows/test.yaml
    with:
      version: '1.93-26.04'

  build-cranelift:
    uses: ./.github/workflows/build.yaml
    with:
      version: '1.93.cranelift-26.04'

  test-cranelift:
    needs: build-cranelift
    uses: ./.github/workflows/test.yaml
    with:
      version: '1.93.cranelift-26.04'

  publish-ghcr:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: [test-llvm, test-cranelift]
    permissions:
      contents: read
      packages: write

    steps:
      # exact names (not patterns) so only the multiarch oci-archives
      # land, not the per-arch artefacts (rust_..._amd64 / _arm64).
      - name: Download LLVM multiarch rock
        uses: actions/download-artifact@v6
        with:
          name: rust_1.93-26.04
          path: artifacts
      - name: Download cranelift multiarch rock
        uses: actions/download-artifact@v6
        with:
          name: rust_1.93.cranelift-26.04
          path: artifacts

      - name: Install Skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Publish to GitHub Container Registry
        run: |
          skopeo copy \
            --dest-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            --multi-arch=all \
            oci-archive:artifacts/rust_1.93-26.04.rock \
            docker://${{ env.REGISTRY }}/${{ github.repository }}/rust:1.93-26.04
          skopeo copy \
            --dest-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            --multi-arch=all \
            oci-archive:artifacts/rust_1.93.cranelift-26.04.rock \
            docker://${{ env.REGISTRY }}/${{ github.repository }}/rust:1.93.cranelift-26.04
