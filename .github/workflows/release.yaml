name: Release

# spellchecker: ignore skopeo creds

# Build + test + publish to ghcr on push of a revision tag (r1, r2, ...).
on:
  push:
    tags:
      - 'r[0-9]*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    uses: ./.github/workflows/build.yaml

  test:
    needs: build
    uses: ./.github/workflows/test.yaml

  publish-ghcr:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: [build, test]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download multiarch rock
        uses: actions/download-artifact@v6
        with:
          name: rust_1.93-26.04
          path: artifacts

      # Per-arch tags disabled -- the multiarch manifest already embeds
      # both per-arch images via content-addressing, so a plain
      # `docker pull rust:1.93-26.04` picks the right arch. Re-enable
      # both this step and the per-arch skopeo copies below if explicit
      # `rust:1.93-26.04-amd64` / `rust:1.93-26.04-arm64` tags are wanted.
      # - name: Download per-arch rocks
      #   uses: actions/download-artifact@v6
      #   with:
      #     pattern: rust_1.93-26.04_*
      #     path: artifacts
      #     merge-multiple: true

      - name: Install Skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Publish to GitHub Container Registry
        run: |
          skopeo copy \
            --dest-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            --multi-arch=all \
            oci-archive:artifacts/rust_1.93-26.04.rock \
            docker://${{ env.REGISTRY }}/${{ github.repository }}/rust:1.93-26.04
          # Per-arch tags disabled; see comment above the per-arch
          # download step. Re-enable both at once if needed.
          # skopeo copy \
          #   --dest-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
          #   oci-archive:artifacts/rust_1.93-26.04_amd64.rock \
          #   docker://${{ env.REGISTRY }}/${{ github.repository }}/rust:1.93-26.04-amd64
          # skopeo copy \
          #   --dest-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
          #   oci-archive:artifacts/rust_1.93-26.04_arm64.rock \
          #   docker://${{ env.REGISTRY }}/${{ github.repository }}/rust:1.93-26.04-arm64
