name: Test

# Reusable: runs spread against the per-arch rocks. Each runner stays
# native (no qemu) -- amd64 runner exercises the amd64 rock against the
# ubuntu-26.04-amd64 spread system; arm64 runner does the arm64 pair.
# Expects the build workflow has already run in the same workflow run
# and uploaded the rust_<version>_<arch> artefacts.
#
# Parametrised by `version` (see build.yaml) so the same workflow tests
# both the LLVM rock and the cranelift rock.
on:
  workflow_call:
    inputs:
      version:
        description: rock version / dir under rust/ (e.g. 1.93-26.04)
        required: true
        type: string

jobs:
  spread:
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download ${{ matrix.arch }} rock
        uses: actions/download-artifact@v6
        with:
          name: rust_${{ inputs.version }}_${{ matrix.arch }}
          path: rust/${{ inputs.version }}/

      - name: Install spread + skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo
          go install github.com/canonical/spread/cmd/spread@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Build sshd test image (${{ matrix.arch }} only)
        run: |
          cd rust/${{ inputs.version }}
          make build-test-image PLATFORMS=${{ matrix.arch }}

      - name: Run spread tests (${{ matrix.arch }})
        run: |
          cd rust/${{ inputs.version }}
          # ensure rock is newer than .rock.stamp so make does not repack
          touch rust_${{ inputs.version }}_*.rock
          spread craft-adhoc:ubuntu-26.04-${{ matrix.arch }}
