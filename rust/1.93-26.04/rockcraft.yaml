# spellchecker: ignore rustc rockcraft coreutils binutils archiver

name: rust
version: '1.93-26.04'
summary: Chiseled rust 1.93 rock
description: |
    Rust is a modern memory-safe systems programming language focused on
    performance and reliability.

    This image is a chiselled Ubuntu rock based on Ubuntu 26.04. It contains
    a minimal Rust 1.93 toolchain (rustc only -- no cargo), a minimal GCC
    toolchain for custom build steps, and `not-quite-cargo`, a small
    replayer that builds rust projects from a pre-generated cargo
    `--build-plan` -- see https://github.com/lczyk/not-quite-cargo.

    Typical use: generate the build plan in any image that ships cargo,
    then replay it inside this rock with `not-quite-cargo run` (with the
    network off, no cargo present).

    Any additional dependencies can be mounted at runtime.

# rust and cargo are dual licensed under MIT or Apache-2.0
# https://www.rust-lang.org/policies/licenses
# the GCC toolchain included in this rock is licensed under GPL-3.0
# https://gcc.gnu.org/onlinedocs/libstdc++/manual/license.html

# commended out since rockcraft does not support license expressions
# https://github.com/canonical/rockcraft/issues/978
# license: (MIT OR Apache-2.0) AND GPL-3.0

base: bare
# TODO: Change the build-base to ubuntu@26.04 once it goes stable
build-base: devel

platforms:
  amd64:
  arm64:

# https://doc.rust-lang.org/cargo/reference/environment-variables.html
environment:
  CARGO_HOME: /cargo

parts:
  rust:
    plugin: nil
    # Pull the chisel-releases definitions ourselves so we can drive
    # `chisel cut` directly with retry-on-flaky-archive logic
    # (rockcraft's default stage-packages flow has no retries and
    # trips on intermittent "expected digest ..." errors).
    source: https://github.com/canonical/chisel-releases.git
    source-type: git
    source-branch: ubuntu-26.04
    build-snaps:
      - chisel
    override-build: bash "$CRAFT_PROJECT_DIR/rust_override_build.sh"

  not-quite-cargo:
    plugin: go
    after: [rust]
    source: https://github.com/lczyk/not-quite-cargo.git
    source-type: git
    source-tag: v0.6.1
    source-subdir: go
    build-snaps:
      - go/1.24/stable
    build-packages:
      - git
    override-build: |
      cd "$CRAFT_PART_BUILD_WORK"
      mkdir -p ./internal/version
      go run github.com/lczyk/version/go/cmd/generate-version \
        -out ./internal/version/version.go -pkg version
      cd "$CRAFT_PART_BUILD"
      craftctl default
